{% extends "base.html" %}
{% block title %}QR Card — {{ player.name }}{% endblock %}

{% block content %}
<style>
.qr-card-wrap {
    max-width: 420px;
    margin: 32px auto;
    padding: 0 16px;
}
.qr-card {
    background: #fff;
    border-radius: 20px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.12);
    padding: 32px 24px 24px;
    text-align: center;
}
.qr-card-logo {
    font-size: 13px;
    font-weight: 800;
    letter-spacing: 2px;
    color: #1565c0;
    text-transform: uppercase;
    margin-bottom: 6px;
}
.qr-card-label {
    font-size: 13px;
    font-weight: 600;
    color: #94a3b8;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 4px;
}
.qr-card-name {
    font-size: 24px;
    font-weight: 800;
    color: #1a1a2e;
    margin-bottom: 20px;
}
.qr-card-img-wrap {
    display: inline-block;
    border: 3px solid #e2e8f0;
    border-radius: 12px;
    padding: 8px;
    background: #fff;
    margin-bottom: 16px;
}
.qr-card-img-wrap img {
    display: block;
    width: 220px;
    height: 220px;
}
.qr-card-scope {
    font-size: 12px;
    color: #94a3b8;
    margin-bottom: 24px;
}
.qr-card-actions {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
}
.qr-btn-print {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 10px 20px;
    border-radius: 12px;
    border: 2px solid #1565c0;
    color: #1565c0;
    font-size: 15px;
    font-weight: 700;
    text-decoration: none;
    background: #fff;
    cursor: pointer;
}
.qr-btn-back {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 10px 20px;
    border-radius: 12px;
    border: 2px solid #64748b;
    color: #64748b;
    font-size: 15px;
    font-weight: 700;
    text-decoration: none;
    background: #fff;
}
@media print {
    .qr-card-actions { display: none; }
    .qr-card-wrap { margin: 0 auto; }
    body { background: #fff; }
}
</style>

<div class="qr-card-wrap">
    <div class="qr-card" id="qrCardPrint">
        <div class="qr-card-logo">PFC Player QR Card</div>
        <div class="qr-card-label">Player</div>
        <div class="qr-card-name">{{ player.name }}</div>
        <div class="qr-card-img-wrap">
            <img src="{{ qr_data_uri }}" alt="QR Code for {{ player.name }}" />
        </div>
        <div class="qr-card-scope">Valid for game participation only &bull; Not for login or account access</div>
        <div class="qr-card-actions">
            <button class="qr-btn-print" onclick="window.print()">
                <i class="fas fa-print"></i> Print
            </button>
            <a href="{% url 'player_profile' player.id %}" class="qr-btn-back">
                <i class="fas fa-arrow-left"></i> Back
            </a>
        </div>
    </div>
</div>
{% endblock %}
