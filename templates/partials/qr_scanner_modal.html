<!-- QR Scanner Modal — reusable partial for all PFC game pages
     Usage: include this file after setting window.QR_RESOLVE_URL
     After scanning, dispatches CustomEvent "qrPlayerResolved" on document with:
       detail: { player_name, player_id, team_name }
     Requires: window.QR_RESOLVE_URL set by the including template before this partial
-->
<style>
#qrScanModal {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 9999;
    background: rgba(0,0,0,0.85);
    flex-direction: column;
    align-items: center;
    justify-content: center;
}
#qrScanModal.active { display: flex; }
.qr-modal-box {
    background: #fff;
    border-radius: 20px;
    padding: 20px;
    width: min(92vw, 400px);
    text-align: center;
}
.qr-modal-title {
    font-size: 16px;
    font-weight: 700;
    color: #1a1a2e;
    margin-bottom: 12px;
}
.qr-modal-video-wrap {
    position: relative;
    width: 100%;
    aspect-ratio: 1;
    background: #000;
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 12px;
}
#qrVideo {
    width: 100%;
    height: 100%;
    object-fit: cover;
}
.qr-scan-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
}
.qr-scan-frame {
    width: 60%;
    aspect-ratio: 1;
    border: 3px solid rgba(255,255,255,0.7);
    border-radius: 12px;
    box-shadow: 0 0 0 9999px rgba(0,0,0,0.35);
}
.qr-modal-status {
    font-size: 14px;
    color: #64748b;
    margin-bottom: 12px;
    min-height: 20px;
}
.qr-modal-status.success { color: #059669; font-weight: 700; }
.qr-modal-status.error { color: #dc2626; font-weight: 700; }
.qr-modal-close {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 10px 20px;
    border-radius: 12px;
    border: 2px solid #64748b;
    color: #64748b;
    font-size: 15px;
    font-weight: 700;
    background: #fff;
    cursor: pointer;
}
</style>

<!-- QR Scanner Modal -->
<div id="qrScanModal">
    <div class="qr-modal-box">
        <div class="qr-modal-title"><i class="fas fa-qrcode"></i> Scan Player QR Card</div>
        <div class="qr-modal-video-wrap">
            <video id="qrVideo" autoplay playsinline muted></video>
            <div class="qr-scan-overlay">
                <div class="qr-scan-frame"></div>
            </div>
        </div>
        <div class="qr-modal-status" id="qrStatus">Point camera at a PFC Player QR Card…</div>
        <button type="button" class="qr-modal-close" onclick="closeQrScanner()">
            <i class="fas fa-times"></i> Cancel
        </button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
<script>
(function() {
    var _stream = null;
    var _canvas = null;
    var _ctx = null;
    var _animFrame = null;
    var _scanning = false;
    var _resolved = false;

    window.openQrScanner = function() {
        _resolved = false;
        document.getElementById('qrStatus').textContent = 'Point camera at a PFC Player QR Card\u2026';
        document.getElementById('qrStatus').className = 'qr-modal-status';
        document.getElementById('qrScanModal').classList.add('active');
        _startCamera();
    };

    window.closeQrScanner = function() {
        _stopCamera();
        document.getElementById('qrScanModal').classList.remove('active');
    };

    function _startCamera() {
        if (!_canvas) {
            _canvas = document.createElement('canvas');
            _ctx = _canvas.getContext('2d');
        }
        var video = document.getElementById('qrVideo');
        navigator.mediaDevices.getUserMedia({
            video: { facingMode: 'environment', width: { ideal: 640 }, height: { ideal: 640 } }
        }).then(function(stream) {
            _stream = stream;
            video.srcObject = stream;
            video.play();
            _scanning = true;
            _tick();
        }).catch(function(err) {
            document.getElementById('qrStatus').textContent = 'Camera access denied. Please allow camera access.';
            document.getElementById('qrStatus').className = 'qr-modal-status error';
        });
    }

    function _stopCamera() {
        _scanning = false;
        if (_animFrame) { cancelAnimationFrame(_animFrame); _animFrame = null; }
        if (_stream) {
            _stream.getTracks().forEach(function(t) { t.stop(); });
            _stream = null;
        }
        var video = document.getElementById('qrVideo');
        video.srcObject = null;
    }

    function _tick() {
        if (!_scanning) return;
        var video = document.getElementById('qrVideo');
        if (video.readyState === video.HAVE_ENOUGH_DATA) {
            _canvas.width = video.videoWidth;
            _canvas.height = video.videoHeight;
            _ctx.drawImage(video, 0, 0, _canvas.width, _canvas.height);
            var imageData = _ctx.getImageData(0, 0, _canvas.width, _canvas.height);
            var code = jsQR(imageData.data, imageData.width, imageData.height, {
                inversionAttempts: 'dontInvert'
            });
            if (code && code.data && !_resolved) {
                _resolved = true;
                _scanning = false;
                _resolveToken(code.data);
                return;
            }
        }
        _animFrame = requestAnimationFrame(_tick);
    }

    function _resolveToken(token) {
        var resolveUrl = window.QR_RESOLVE_URL;
        if (!resolveUrl) {
            document.getElementById('qrStatus').textContent = 'Configuration error: resolve URL not set.';
            document.getElementById('qrStatus').className = 'qr-modal-status error';
            return;
        }
        document.getElementById('qrStatus').textContent = 'Verifying QR code\u2026';
        document.getElementById('qrStatus').className = 'qr-modal-status';

        fetch(resolveUrl, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': _getCsrf()
            },
            body: JSON.stringify({ token: token })
        })
        .then(function(r) { return r.json(); })
        .then(function(data) {
            if (data.ok) {
                /* Show player name only — never expose codename in UI */
                document.getElementById('qrStatus').textContent = '\u2713 ' + data.player_name;
                document.getElementById('qrStatus').className = 'qr-modal-status success';
                _stopCamera();
                setTimeout(function() {
                    closeQrScanner();
                    document.dispatchEvent(new CustomEvent('qrPlayerResolved', { detail: data }));
                }, 900);
            } else {
                document.getElementById('qrStatus').textContent = '\u2717 ' + (data.error || 'Invalid QR code');
                document.getElementById('qrStatus').className = 'qr-modal-status error';
                setTimeout(function() {
                    _resolved = false;
                    _scanning = true;
                    document.getElementById('qrStatus').textContent = 'Point camera at a PFC Player QR Card\u2026';
                    document.getElementById('qrStatus').className = 'qr-modal-status';
                    _tick();
                }, 2000);
            }
        })
        .catch(function(err) {
            document.getElementById('qrStatus').textContent = 'Network error. Please try again.';
            document.getElementById('qrStatus').className = 'qr-modal-status error';
            setTimeout(function() {
                _resolved = false;
                _scanning = true;
                document.getElementById('qrStatus').textContent = 'Point camera at a PFC Player QR Card\u2026';
                document.getElementById('qrStatus').className = 'qr-modal-status';
                _tick();
            }, 2000);
        });
    }

    function _getCsrf() {
        var el = document.querySelector('[name=csrfmiddlewaretoken]');
        if (el) return el.value;
        var cookie = document.cookie.split(';').find(function(c) { return c.trim().startsWith('csrftoken='); });
        return cookie ? cookie.trim().split('=')[1] : '';
    }
})();
</script>
