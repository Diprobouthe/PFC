<!-- QR Scanner Modal — reusable partial for all PFC game pages
     Usage: include this file after setting window.QR_RESOLVE_URL
     Flow:
       1. Scan QR → server resolves identity (HMAC-verified)
       2. Confirmation panel shown: avatar + name + "Confirm / Add Player" button
       3. Only after organizer taps Confirm does the modal dispatch:
            CustomEvent "qrPlayerResolved" on document with:
              detail: { player_name, player_id, team_name, profile_picture_url }
     Requires: window.QR_RESOLVE_URL set by the including template before this partial
-->
<style>
#qrScanModal {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 9999;
    background: rgba(0,0,0,0.85);
    flex-direction: column;
    align-items: center;
    justify-content: center;
}
#qrScanModal.active { display: flex; }
.qr-modal-box {
    background: #fff;
    border-radius: 20px;
    padding: 20px;
    width: min(92vw, 400px);
    text-align: center;
}
.qr-modal-title {
    font-size: 16px;
    font-weight: 700;
    color: #1a1a2e;
    margin-bottom: 12px;
}
.qr-modal-video-wrap {
    position: relative;
    width: 100%;
    aspect-ratio: 1;
    background: #000;
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 12px;
}
#qrVideo {
    width: 100%;
    height: 100%;
    object-fit: cover;
}
.qr-scan-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
}
.qr-scan-frame {
    width: 60%;
    aspect-ratio: 1;
    border: 3px solid rgba(255,255,255,0.7);
    border-radius: 12px;
    box-shadow: 0 0 0 9999px rgba(0,0,0,0.35);
}
.qr-modal-status {
    font-size: 14px;
    color: #64748b;
    margin-bottom: 12px;
    min-height: 20px;
}
.qr-modal-status.success { color: #059669; font-weight: 700; }
.qr-modal-status.error   { color: #dc2626; font-weight: 700; }
.qr-modal-close {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 10px 20px;
    border-radius: 12px;
    border: 2px solid #64748b;
    color: #64748b;
    font-size: 15px;
    font-weight: 700;
    background: #fff;
    cursor: pointer;
}

/* ── Confirmation panel (shown after successful scan, before dispatch) ── */
#qrConfirmPanel {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 0;
}
#qrConfirmPanel.active { display: flex; }
.qr-confirm-avatar {
    width: 88px;
    height: 88px;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid #0ea5e9;
    margin-bottom: 12px;
    background: #e2e8f0;
}
.qr-confirm-avatar-default {
    width: 88px;
    height: 88px;
    border-radius: 50%;
    background: linear-gradient(135deg, #0ea5e9 0%, #6366f1 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 12px;
    border: 3px solid #0ea5e9;
    flex-shrink: 0;
}
.qr-confirm-avatar-default span {
    font-size: 36px;
    color: #fff;
    font-weight: 700;
    line-height: 1;
}
.qr-confirm-name {
    font-size: 20px;
    font-weight: 800;
    color: #1a1a2e;
    margin-bottom: 2px;
}
.qr-confirm-team {
    font-size: 13px;
    color: #64748b;
    margin-bottom: 16px;
}
.qr-confirm-question {
    font-size: 13px;
    color: #475569;
    margin-bottom: 18px;
    font-style: italic;
}
.qr-confirm-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 13px 28px;
    border-radius: 14px;
    border: none;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    width: 100%;
    justify-content: center;
    margin-bottom: 10px;
}
.qr-confirm-btn.confirm {
    background: #059669;
    color: #fff;
}
.qr-confirm-btn.confirm:hover { background: #047857; }
.qr-confirm-btn.cancel {
    background: #f1f5f9;
    color: #64748b;
    border: 2px solid #cbd5e1;
}
.qr-confirm-btn.cancel:hover { background: #e2e8f0; }
</style>

<!-- QR Scanner Modal -->
<div id="qrScanModal">
    <div class="qr-modal-box">

        <!-- ── Scan panel ── -->
        <div id="qrScanPanel">
            <div class="qr-modal-title"><i class="fas fa-qrcode"></i> Scan Player QR Card</div>
            <div class="qr-modal-video-wrap">
                <video id="qrVideo" autoplay playsinline muted></video>
                <div class="qr-scan-overlay">
                    <div class="qr-scan-frame"></div>
                </div>
            </div>
            <div class="qr-modal-status" id="qrStatus">Point camera at a PFC Player QR Card…</div>
            <button type="button" class="qr-modal-close" onclick="closeQrScanner()">
                <i class="fas fa-times"></i> Cancel
            </button>
        </div>

        <!-- ── Confirmation panel (hidden until scan succeeds) ── -->
        <div id="qrConfirmPanel">
            <div class="qr-modal-title"><i class="fas fa-user-check"></i> Confirm Player</div>
            <!-- Avatar: real photo or default initial -->
            <img id="qrConfirmPhoto" class="qr-confirm-avatar" src="" alt="" style="display:none;">
            <div id="qrConfirmAvatarDefault" class="qr-confirm-avatar-default" style="display:none;">
                <span id="qrConfirmInitial">?</span>
            </div>
            <div class="qr-confirm-name" id="qrConfirmName">—</div>
            <div class="qr-confirm-team" id="qrConfirmTeamName"></div>
            <div class="qr-confirm-question">Is this the correct player?</div>
            <button type="button" class="qr-confirm-btn confirm" id="qrConfirmYes">
                <i class="fas fa-check-circle"></i> Confirm / Add Player
            </button>
            <button type="button" class="qr-confirm-btn cancel" onclick="closeQrScanner()">
                <i class="fas fa-times"></i> Cancel
            </button>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
<script>
(function() {
    var _stream = null;
    var _canvas = null;
    var _ctx = null;
    var _animFrame = null;
    var _scanning = false;
    var _resolved = false;
    var _pendingData = null;   // holds server response while confirmation is shown

    window.openQrScanner = function() {
        _resolved = false;
        _pendingData = null;
        _showScanPanel();
        document.getElementById('qrStatus').textContent = 'Point camera at a PFC Player QR Card\u2026';
        document.getElementById('qrStatus').className = 'qr-modal-status';
        document.getElementById('qrScanModal').classList.add('active');
        _startCamera();
    };

    window.closeQrScanner = function() {
        _stopCamera();
        _pendingData = null;
        document.getElementById('qrScanModal').classList.remove('active');
        // Reset to scan panel for next open
        _showScanPanel();
    };

    function _showScanPanel() {
        document.getElementById('qrScanPanel').style.display = '';
        document.getElementById('qrConfirmPanel').classList.remove('active');
    }

    function _showConfirmPanel(data) {
        // Hide scan panel
        document.getElementById('qrScanPanel').style.display = 'none';

        // Populate avatar
        var photo = document.getElementById('qrConfirmPhoto');
        var avatarDefault = document.getElementById('qrConfirmAvatarDefault');
        var initial = document.getElementById('qrConfirmInitial');
        if (data.profile_picture_url) {
            photo.src = data.profile_picture_url;
            photo.style.display = '';
            avatarDefault.style.display = 'none';
        } else {
            photo.style.display = 'none';
            avatarDefault.style.display = 'flex';
            initial.textContent = (data.player_name || '?').charAt(0).toUpperCase();
        }

        // Populate name and team
        document.getElementById('qrConfirmName').textContent = data.player_name || '—';
        var teamEl = document.getElementById('qrConfirmTeamName');
        teamEl.textContent = data.team_name ? data.team_name : '';

        // Wire up the Confirm button (replace any previous listener)
        var btn = document.getElementById('qrConfirmYes');
        var newBtn = btn.cloneNode(true);
        btn.parentNode.replaceChild(newBtn, btn);
        newBtn.addEventListener('click', function() {
            closeQrScanner();
            document.dispatchEvent(new CustomEvent('qrPlayerResolved', { detail: data }));
        });

        document.getElementById('qrConfirmPanel').classList.add('active');
    }

    function _startCamera() {
        if (!_canvas) {
            _canvas = document.createElement('canvas');
            _ctx = _canvas.getContext('2d');
        }
        var video = document.getElementById('qrVideo');
        navigator.mediaDevices.getUserMedia({
            video: { facingMode: 'environment', width: { ideal: 640 }, height: { ideal: 640 } }
        }).then(function(stream) {
            _stream = stream;
            video.srcObject = stream;
            video.play();
            _scanning = true;
            _tick();
        }).catch(function(err) {
            document.getElementById('qrStatus').textContent = 'Camera access denied. Please allow camera access.';
            document.getElementById('qrStatus').className = 'qr-modal-status error';
        });
    }

    function _stopCamera() {
        _scanning = false;
        if (_animFrame) { cancelAnimationFrame(_animFrame); _animFrame = null; }
        if (_stream) {
            _stream.getTracks().forEach(function(t) { t.stop(); });
            _stream = null;
        }
        var video = document.getElementById('qrVideo');
        video.srcObject = null;
    }

    function _tick() {
        if (!_scanning) return;
        var video = document.getElementById('qrVideo');
        if (video.readyState === video.HAVE_ENOUGH_DATA) {
            _canvas.width = video.videoWidth;
            _canvas.height = video.videoHeight;
            _ctx.drawImage(video, 0, 0, _canvas.width, _canvas.height);
            var imageData = _ctx.getImageData(0, 0, _canvas.width, _canvas.height);
            var code = jsQR(imageData.data, imageData.width, imageData.height, {
                inversionAttempts: 'dontInvert'
            });
            if (code && code.data && !_resolved) {
                _resolved = true;
                _scanning = false;
                _resolveToken(code.data);
                return;
            }
        }
        _animFrame = requestAnimationFrame(_tick);
    }

    function _resolveToken(token) {
        var resolveUrl = window.QR_RESOLVE_URL;
        if (!resolveUrl) {
            document.getElementById('qrStatus').textContent = 'Configuration error: resolve URL not set.';
            document.getElementById('qrStatus').className = 'qr-modal-status error';
            return;
        }
        document.getElementById('qrStatus').textContent = 'Verifying QR code\u2026';
        document.getElementById('qrStatus').className = 'qr-modal-status';

        fetch(resolveUrl, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': _getCsrf()
            },
            body: JSON.stringify({ token: token })
        })
        .then(function(r) { return r.json(); })
        .then(function(data) {
            if (data.ok) {
                /* Stop camera, then show confirmation panel.
                   qrPlayerResolved is NOT dispatched yet — only after organizer taps Confirm. */
                _stopCamera();
                _pendingData = data;
                _showConfirmPanel(data);
            } else {
                document.getElementById('qrStatus').textContent = '\u2717 ' + (data.error || 'Invalid QR code');
                document.getElementById('qrStatus').className = 'qr-modal-status error';
                setTimeout(function() {
                    _resolved = false;
                    _scanning = true;
                    document.getElementById('qrStatus').textContent = 'Point camera at a PFC Player QR Card\u2026';
                    document.getElementById('qrStatus').className = 'qr-modal-status';
                    _tick();
                }, 2000);
            }
        })
        .catch(function(err) {
            document.getElementById('qrStatus').textContent = 'Network error. Please try again.';
            document.getElementById('qrStatus').className = 'qr-modal-status error';
            setTimeout(function() {
                _resolved = false;
                _scanning = true;
                document.getElementById('qrStatus').textContent = 'Point camera at a PFC Player QR Card\u2026';
                document.getElementById('qrStatus').className = 'qr-modal-status';
                _tick();
            }, 2000);
        });
    }

    function _getCsrf() {
        var el = document.querySelector('[name=csrfmiddlewaretoken]');
        if (el) return el.value;
        var cookie = document.cookie.split(';').find(function(c) { return c.trim().startsWith('csrftoken='); });
        return cookie ? cookie.trim().split('=')[1] : '';
    }
})();
</script>
